<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loremaster — The Archive</title>
  <meta name="description" content="Campaign lore, world-building notes, and session records.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #0d0b12; --bg-mid: #141218;
      --bg-card: rgba(30,28,36,0.8);
      --text-bright: rgba(255,255,255,0.95); --text-mid: rgba(255,255,255,0.75);
      --text-dim: rgba(255,255,255,0.45); --text-faint: rgba(255,255,255,0.15);
      --gold: #ffd700; --gold-dim: rgba(255,215,0,0.7);
      --border: rgba(255,255,255,0.06);
    }
    body {
      background: linear-gradient(170deg, var(--bg-deep) 0%, var(--bg-mid) 40%, #0f0d14 100%);
      color: #fff; font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
      pointer-events: none; z-index: 1;
    }
    canvas#particles { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 2; max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
    .site-header { margin-bottom: 48px; }
    .site-logo {
      cursor: pointer; display: inline-flex; align-items: baseline; gap: 12px;
      user-select: none; font-family: 'Cinzel', serif; font-weight: 900;
      font-size: 14px; letter-spacing: 0.35em; color: var(--gold-dim);
      text-transform: uppercase; text-decoration: none;
    }
    .header-line { width: 100%; height: 1px; margin-top: 16px; background: linear-gradient(90deg, rgba(255,215,0,0.2), rgba(255,255,255,0.05), transparent); }
    .breadcrumb {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 12px 0; margin-bottom: 8px; font-size: 13px;
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.4); text-transform: uppercase;
    }
    .breadcrumb a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; cursor: pointer; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb .sep { color: rgba(255,255,255,0.2); }
    .breadcrumb .current { color: rgba(255,255,255,0.7); }
    #content { transition: opacity 0.25s ease, transform 0.25s ease; }
    #content.fade-out { opacity: 0; transform: translateY(8px); }
    .hero h1 {
      font-family: 'Cinzel', serif; font-weight: 900;
      font-size: clamp(36px, 6vw, 56px); letter-spacing: 0.08em; line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, rgba(255,215,0,0.8) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero p { font-size: 18px; color: var(--text-dim); line-height: 1.6; font-style: italic; margin-top: 20px; max-width: 600px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .card-grid.narrow { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card {
      position: relative; cursor: pointer; overflow: hidden;
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(20,18,25,0.95) 100%);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 28px 24px; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none; display: block; color: inherit;
    }
    .card.large { padding: 40px 36px; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; opacity: 0; transition: opacity 0.35s; }
    .card:hover::after { opacity: 0.6; }
    .card .bg-icon { position: absolute; top: -20px; right: -10px; font-size: 80px; opacity: 0.03; line-height: 1; pointer-events: none; transition: opacity 0.35s; }
    .card.large .bg-icon { font-size: 120px; }
    .card:hover .bg-icon { opacity: 0.08; }
    .card .icon { font-size: 20px; margin-bottom: 12px; }
    .card.large .icon { font-size: 28px; }
    .card h3 { font-family: 'Cinzel', serif; font-weight: 700; font-size: 16px; letter-spacing: 0.12em; color: var(--text-bright); transition: color 0.3s; margin-bottom: 8px; }
    .card.large h3 { font-size: 22px; }
    .card p { font-size: 14px; color: var(--text-dim); line-height: 1.5; font-style: italic; }
    .card.large p { font-size: 16px; }

    /* Banner card (region with image) */
    .card-banner {
      position: relative; cursor: pointer; overflow: hidden;
      border: 1px solid var(--border); border-radius: 4px;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none; display: block; color: inherit;
    }
    .card-banner:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .card-banner .card-banner-img {
      width: 100%; height: 160px; object-fit: cover; display: block;
      filter: brightness(0.55) saturate(0.8);
      transition: filter 0.35s, transform 0.5s;
    }
    .card-banner:hover .card-banner-img { filter: brightness(0.75) saturate(1); transform: scale(1.03); }
    .card-banner .card-banner-body {
      padding: 20px 24px; position: relative;
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(20,18,25,0.95) 100%);
    }
    .card-banner h3 { font-family: 'Cinzel', serif; font-weight: 700; font-size: 16px; letter-spacing: 0.12em; color: var(--text-bright); transition: color 0.3s; margin-bottom: 6px; }
    .card-banner p { font-size: 14px; color: var(--text-dim); line-height: 1.5; font-style: italic; }
    .card-banner::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; opacity: 0; transition: opacity 0.35s; }
    .card-banner:hover::after { opacity: 0.6; }

    .card-placeholder {
      border: 1px dashed rgba(255,255,255,0.08); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      letter-spacing: 0.1em; min-height: 160px;
    }
    .section-label {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.25em; color: rgba(255,255,255,0.3);
      text-transform: uppercase; margin-bottom: 20px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .page-heading { margin-bottom: 48px; }
    .page-heading .icon-large { font-size: 36px; margin-bottom: 12px; }
    .page-heading h1 { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 16px; line-height: 1.2; }
    .page-heading p { font-size: 17px; color: rgba(255,255,255,0.5); max-width: 600px; line-height: 1.7; }

    /* Region banner */
    .region-banner { width: 100%; height: 280px; border-radius: 4px; overflow: hidden; margin-bottom: 36px; position: relative; }
    .region-banner img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.45) saturate(0.85); }
    .region-banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(13,11,18,0.95) 0%, rgba(13,11,18,0.3) 50%, rgba(13,11,18,0.05) 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 36px;
    }
    .region-banner-overlay h1 {
      font-family: 'Cinzel', serif; font-weight: 900;
      font-size: clamp(24px, 4vw, 36px); letter-spacing: 0.1em;
      color: var(--text-bright); margin-bottom: 8px;
    }
    .region-banner-overlay p { font-size: 16px; color: rgba(255,255,255,0.55); max-width: 500px; line-height: 1.6; font-style: italic; }

    /* Lore list rows */
    .lore-row {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; padding: 20px 24px;
      background: rgba(30,28,36,0.6); border: 1px solid var(--border); border-radius: 4px;
      transition: all 0.3s; margin-bottom: 12px; text-decoration: none; color: inherit;
    }
    .lore-row:hover { background: rgba(40,38,50,0.8); }
    .lore-row-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
    .lore-row-thumb {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,255,255,0.08); flex-shrink: 0;
      filter: saturate(0.8); transition: border-color 0.3s, filter 0.3s;
    }
    .lore-row:hover .lore-row-thumb { filter: saturate(1); }
    .lore-row h3 { font-family: 'Cinzel', serif; font-weight: 600; font-size: 16px; letter-spacing: 0.08em; color: rgba(255,255,255,0.85); margin-bottom: 4px; }
    .lore-row .preview { font-size: 14px; color: rgba(255,255,255,0.35); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lore-row .arrow { color: rgba(255,255,255,0.2); font-size: 20px; font-family: 'Cinzel', serif; flex-shrink: 0; margin-left: 16px; }

    /* Lore article */
    .lore-article { max-width: 720px; }
    .lore-article h1 { font-family: 'Cinzel', serif; font-weight: 900; font-size: 32px; letter-spacing: 0.1em; color: var(--text-bright); line-height: 1.2; }
    .lore-article .divider { width: 60px; height: 2px; margin: 16px 0 32px; }
    .lore-article p { font-size: 18px; line-height: 1.75; color: var(--text-mid); margin-bottom: 20px; }

    /* Character portrait (floated right) */
    .lore-portrait-wrap { float: right; margin: 0 0 20px 28px; max-width: 240px; width: 40%; }
    .lore-portrait-wrap img {
      width: 100%; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      filter: saturate(0.9); box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .lore-portrait-wrap .portrait-caption {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.25);
      text-transform: uppercase; text-align: center; margin-top: 8px;
    }

    /* Full-width lore header image */
    .lore-header-img {
      width: 100%; max-height: 320px; object-fit: cover;
      border-radius: 4px; margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.06);
      filter: brightness(0.7) saturate(0.85);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .site-footer {
      margin-top: 80px; padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.1em; color: var(--text-faint); text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .container { padding: 24px 16px 60px; }
      .card-grid, .card-grid.narrow { grid-template-columns: 1fr; }
      .region-banner { height: 200px; }
      .region-banner-overlay { padding: 20px; }
      .lore-portrait-wrap { float: none; max-width: 100%; width: 100%; margin: 0 0 24px 0; }
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="container">
  <header class="site-header">
    <a class="site-logo" onclick="navigate([])" href="#">◆ Loremaster</a>
    <div class="header-line"></div>
  </header>
  <div id="breadcrumb"></div>
  <div id="content"></div>
  <footer class="site-footer">Loremaster Archive · Built with care</footer>
</div>
<script>
// ═══════════════════════════════════════════════════════════════════════
// LORE DATA — EDIT THIS TO ADD YOUR CONTENT
// ═══════════════════════════════════════════════════════════════════════
//
// ★ HOW IMAGES WORK:
//
//   1. Create an "images/" folder in your GitHub repo
//   2. Organize however you like: images/argos/knight.jpg, etc.
//   3. Reference them by relative path in the data below
//
// ★ REGION IMAGES  →  Big banner on the region page + thumbnail on its card
//     image: "images/lancer/northern-reaches.jpg"
//
// ★ LORE PAGE IMAGES  →  Two layout modes:
//     image: "images/argos/aldric.jpg"
//     imagePosition: "portrait"   ← floats right, wraps text (DEFAULT)
//     imagePosition: "header"     ← full-width banner above text
//     imageCaption: "Optional label under portraits"
//
//   Pages with images also get a circular thumbnail in the lore list.
//
// ═══════════════════════════════════════════════════════════════════════

const LORE_DATA = {
  "lancer": {
    name: "LANCER",
    tagline: "The stars are yours to claim",
    icon: "⬡",
    color: "#00e5ff",
    description: "Mech combat in a far-future galaxy where humanity has spread across the stars. Corporations, unions, and revolutionary cells clash over the fate of billions.",
    campaigns: {
      "praxia": {
        name: "PRAXIA",
        description: "A world on the edge of Union space, caught between colonial ambition and indigenous resistance.",
        regions: {
          "north": {
            name: "THE NORTHERN REACHES",
            description: "Frozen tundra and shattered orbital debris fields. The mechs here are built for endurance.",
            // image: "images/lancer/northern-reaches.jpg",
            pages: [
              {
                title: "Coldspire Station",
                // image: "images/lancer/coldspire.jpg",
                // imagePosition: "header",
                content: "An ancient Harrison Armory research outpost, Coldspire Station sits atop a geothermal vent in the northern permafrost. Once a classified weapons testing facility, it was abandoned during the Interest War and has since been claimed by a collective of ice-miners and salvagers known as the Frostbreak Union.\n\nThe station's lower levels remain sealed — radiation signatures suggest active reactor cores, and survivors of unauthorized expeditions speak of autonomous defense systems still patrolling the corridors.\n\nKey NPCs: Overseer Maren Voss (Frostbreak Union leader), Dr. Calith Renn (rogue scientist), PATIENCE (station AI, status unknown)"
              },
              {
                title: "The Shardfields",
                content: "When the colonial transport MSV Anvil of Dawn broke apart during atmospheric entry, its wreckage scattered across 200 kilometers of tundra. Over decades, the debris field became a graveyard and a goldmine.\n\nScavenger crews operate in shifting territories, stripping hull plating and circuit boards from frozen wreckage. Mech-scale combat is common — not formal engagements, but ambushes and territorial skirmishes between rival crews.\n\nThe deepest section, known as the Core Scar, contains the ship's reactor module. No one who has entered has returned with the same story twice."
              }
            ]
          },
          "south": {
            name: "THE SOUTHERN BASIN",
            description: "Jungle canopy and river networks. A hotbed of Union activity and corporate espionage.",
            // image: "images/lancer/southern-basin.jpg",
            pages: [
              {
                title: "Port Mahara",
                content: "The largest settlement on Praxia's southern coast, Port Mahara is a chaotic sprawl of prefab structures, open-air markets, and landing pads. It serves as the primary point of contact between offworld interests and the planet's interior.\n\nUnion Administrative personnel maintain a nominal presence, but real power belongs to the merchant cartels who control cargo flow. The Dockmaster, a figure known only as 'Sable,' has maintained an uneasy peace between factions for seven years.\n\nThe port's famous night market sells everything from bootleg mech parts to Cosmopolitan-grade cuisine."
              }
            ]
          }
        }
      }
    }
  },
  "dnd-argos": {
    name: "D&D — ARGOS",
    tagline: "Where gods walk among the fallen",
    icon: "⚔",
    color: "#ffd700",
    description: "A homebrew Dungeons & Dragons setting inspired by classical mythology, political intrigue, and the slow decay of a once-great civilization.",
    campaigns: {
      "argos-prime": {
        name: "THE ARGOS CAMPAIGN",
        description: "The central continent and its fractured kingdoms.",
        regions: {
          "heartlands": {
            name: "THE HEARTLANDS",
            description: "Fertile plains and ancient cities. The seat of what remains of the old empire.",
            // image: "images/argos/heartlands.jpg",
            pages: [
              {
                title: "The City of Thyros",
                // image: "images/argos/thyros.jpg",
                // imagePosition: "header",
                content: "Once the capital of the Argosian Empire, Thyros is now a city divided. The Upper City, perched on the Acropolis, houses the Senate and the great temples. The Lower City sprawls outward in concentric rings of markets, tenements, and guild halls.\n\nThe Senate has not convened in full session for three years. Factional disputes between the Optimates (old-blood aristocracy) and the Populares (merchant class reformers) have paralyzed governance. Meanwhile, the Cult of the Unburned grows in the catacombs beneath the city.\n\nKey Locations: The Acropolis, The Agora of Echoes, The Sunken Temple of Pallas, The Red Quarter"
              },
              {
                title: "The Fields of Ashenmoor",
                content: "A vast expanse of farmland turned battlefield turned haunted wasteland. Ashenmoor was the site of the Battle of Ten Thousand Spears, where the Empire's legions were shattered by a coalition of barbarian tribes and rogue sorcerers.\n\nThe dead do not rest easily here. Farmers who work the edges of the moor report spectral legionnaires marching in formation at twilight. The Church of the Dawnfather has sent three expeditions to consecrate the land; none have succeeded.\n\nA druidic circle known as the Ashwardens maintains a tenuous vigil, using ancient rites to keep the worst of the undead contained."
              }
            ]
          },
          "coast": {
            name: "THE SHATTERED COAST",
            description: "Pirate havens, sea trade, and the ruins of a civilization swallowed by the tides.",
            // image: "images/argos/shattered-coast.jpg",
            pages: [
              {
                title: "Commander Aldric",
                image: "images/argos/aldric.jpg",
                imagePosition: "portrait",
                imageCaption: "Commander Aldric — The Iron Shore",
                content: "Commander Aldric commands the garrison at Breakwater Keep, the last imperial fortification on the Shattered Coast. A man of rigid discipline and quiet conviction, he has held the keep for eleven years against pirates, smugglers, and the occasional sea monster.\n\nHis soldiers respect him without loving him. His superiors in Thyros have forgotten he exists. He prefers it that way.\n\nAldric's great secret: he has been in quiet communication with the Captain's Council of Pelagos. Not treasonous correspondence — pragmatic negotiation. He understands that the coast cannot be held by force alone, and that the floating city's intelligence network is more valuable than another cohort of legionnaires.\n\nKey Details: Human Fighter, late 40s. Scar across the bridge of his nose from a boarding action. Wears a worn wolf-fur cloak over imperial plate. Speaks softly. Never makes a threat he can't keep."
              },
              {
                title: "Pelagos — The Floating City",
                // image: "images/argos/pelagos.jpg",
                // imagePosition: "header",
                content: "Built on a network of anchored ships, pontoons, and reclaimed hulls, Pelagos is a city that literally never touches solid ground. It drifts slowly along the Shattered Coast, following trade currents and avoiding imperial patrols.\n\nGovernance is by the Captain's Council — the twelve wealthiest ship-owners who anchor the city's core. Law is loose but enforced: steal from a captain and you swim. Everything else is negotiable.\n\nThe city's greatest attraction is the Depths Market, where salvage divers sell artifacts pulled from the submerged ruins of Old Pelagos — the original city, sunk in a cataclysm two centuries ago."
              }
            ]
          }
        }
      }
    }
  }
};

// ═══════════════════════════════════════════════════════════════════════
// RENDERING ENGINE — You don't need to edit below here
// ═══════════════════════════════════════════════════════════════════════

let currentPath = [];

function hexToRgb(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}

function navigate(newPath) {
  const content = document.getElementById('content');
  content.classList.add('fade-out');
  setTimeout(() => {
    currentPath = newPath;
    updateHash();
    render();
    content.classList.remove('fade-out');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 200);
}

function updateHash() {
  const hash = currentPath.map(p => p.key).join('/');
  window.location.hash = hash ? '#/' + hash : '';
}

function parseHash() {
  const hash = window.location.hash.replace(/^#\/?/, '');
  if (!hash) return [];
  const keys = hash.split('/');
  const path = [];
  if (keys[0] && LORE_DATA[keys[0]]) {
    const sys = LORE_DATA[keys[0]];
    path.push({ key: keys[0], label: sys.name });
    if (keys[1] && sys.campaigns[keys[1]]) {
      const camp = sys.campaigns[keys[1]];
      path.push({ key: keys[1], label: camp.name });
      if (keys[2] && camp.regions[keys[2]]) {
        const region = camp.regions[keys[2]];
        path.push({ key: keys[2], label: region.name });
        if (keys[3] !== undefined) {
          const idx = parseInt(keys[3]);
          if (region.pages[idx]) {
            path.push({ key: idx, label: region.pages[idx].title });
          }
        }
      }
    }
  }
  return path;
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  if (currentPath.length === 0) { el.innerHTML = ''; return; }
  let html = '<nav class="breadcrumb"><a onclick="navigate([])">Home</a>';
  currentPath.forEach((crumb, i) => {
    html += '<span class="sep">›</span>';
    if (i < currentPath.length - 1) {
      html += `<a onclick='navigate(${JSON.stringify(currentPath.slice(0, i + 1))})'>${crumb.label}</a>`;
    } else {
      html += `<span class="current">${crumb.label}</span>`;
    }
  });
  el.innerHTML = html + '</nav>';
}

function cardHTML(title, subtitle, icon, color, clickPath, large) {
  const cls = large ? 'card large' : 'card';
  const p = JSON.stringify(clickPath);
  return `<div class="${cls}" onclick='navigate(${p})'
    onmouseenter="this.style.borderColor='${color}60';this.style.background='linear-gradient(135deg,rgba(${hexToRgb(color)},0.12) 0%,rgba(20,18,25,0.95) 100%)';this.querySelector('h3').style.color='${color}'"
    onmouseleave="this.style.borderColor='';this.style.background='';this.querySelector('h3').style.color=''">
    <div class="bg-icon">${icon}</div>
    <div class="icon" style="filter:drop-shadow(0 0 8px ${color}40)">${icon}</div>
    <h3>${title}</h3>${subtitle?`<p>${subtitle}</p>`:''}
    <style>.card:hover::after{background:linear-gradient(90deg,transparent,${color},transparent)}</style></div>`;
}

function bannerCardHTML(title, subtitle, imgSrc, color, clickPath) {
  const p = JSON.stringify(clickPath);
  return `<div class="card-banner" onclick='navigate(${p})'
    onmouseenter="this.style.borderColor='${color}60';this.querySelector('h3').style.color='${color}'"
    onmouseleave="this.style.borderColor='';this.querySelector('h3').style.color=''">
    <div style="overflow:hidden;height:160px"><img class="card-banner-img" src="${imgSrc}" alt="${title}" loading="lazy"></div>
    <div class="card-banner-body"><h3>${title}</h3>${subtitle?`<p>${subtitle}</p>`:''}</div>
    <style>.card-banner:hover::after{background:linear-gradient(90deg,transparent,${color},transparent)}</style></div>`;
}

function render() {
  renderBreadcrumb();
  const el = document.getElementById('content');
  const depth = currentPath.length;

  if (depth === 0) {
    let cards = '';
    for (const [key, sys] of Object.entries(LORE_DATA)) {
      cards += cardHTML(sys.name, sys.tagline, sys.icon, sys.color, [{key, label:sys.name}], true);
    }
    el.innerHTML = `<div class="hero" style="margin-bottom:56px;max-width:600px"><h1>THE ARCHIVE</h1><p>Campaign lore, world-building notes, and session records. Select a system to begin.</p></div><div class="card-grid">${cards}<div class="card-placeholder">+ ADD SYSTEM</div></div>`;
    return;
  }

  const sys = LORE_DATA[currentPath[0].key];
  const color = sys.color;

  if (depth === 1) {
    let cards = '';
    for (const [key, camp] of Object.entries(sys.campaigns)) {
      cards += cardHTML(camp.name, camp.description, '📜', color, [...currentPath, {key, label:camp.name}], false);
    }
    el.innerHTML = `<div class="page-heading"><div class="icon-large" style="filter:drop-shadow(0 0 12px ${color}30)">${sys.icon}</div><h1 style="font-size:clamp(28px,5vw,44px);color:${color}">${sys.name}</h1><p>${sys.description}</p></div><div class="section-label">Campaigns</div><div class="card-grid narrow">${cards}</div>`;
    return;
  }

  const camp = sys.campaigns[currentPath[1].key];

  if (depth === 2) {
    let cards = '';
    for (const [key, region] of Object.entries(camp.regions)) {
      const rPath = [...currentPath, {key, label:region.name}];
      cards += region.image
        ? bannerCardHTML(region.name, region.description, region.image, color, rPath)
        : cardHTML(region.name, region.description, '🗺', color, rPath, false);
    }
    el.innerHTML = `<div class="page-heading"><h1 style="font-size:clamp(28px,5vw,40px)">${camp.name}</h1><p>${camp.description}</p></div><div class="section-label">Regions</div><div class="card-grid narrow">${cards}</div>`;
    return;
  }

  const region = camp.regions[currentPath[2].key];

  if (depth === 3) {
    let header = region.image
      ? `<div class="region-banner"><img src="${region.image}" alt="${region.name}" loading="lazy"><div class="region-banner-overlay"><h1>${region.name}</h1><p>${region.description}</p></div></div>`
      : `<div class="page-heading"><h1 style="font-size:clamp(24px,4vw,36px)">${region.name}</h1><p>${region.description}</p></div>`;

    let rows = '';
    region.pages.forEach((page, idx) => {
      const cp = JSON.stringify([...currentPath, {key:idx, label:page.title}]);
      const thumb = page.image
        ? `<img class="lore-row-thumb" src="${page.image}" alt="" loading="lazy" style="border-color:${color}20">`
        : '';
      rows += `<div class="lore-row" onclick='navigate(${cp})'
        onmouseenter="this.style.borderColor='${color}40';this.style.background='rgba(${hexToRgb(color)},0.06)'"
        onmouseleave="this.style.borderColor='';this.style.background=''">
        <div class="lore-row-left">${thumb}<div style="min-width:0"><h3>${page.title}</h3><div class="preview">${page.content.substring(0,100)}…</div></div></div>
        <span class="arrow">→</span></div>`;
    });
    el.innerHTML = `${header}<div class="section-label">Lore Entries</div>${rows}`;
    return;
  }

  if (depth === 4) {
    const page = region.pages[currentPath[3].key];
    const pos = page.imagePosition || 'portrait';
    let headerImg = '';
    let portrait = '';

    if (page.image && pos === 'header') {
      headerImg = `<img class="lore-header-img" src="${page.image}" alt="${page.title}" loading="lazy">`;
    } else if (page.image && pos === 'portrait') {
      portrait = `<div class="lore-portrait-wrap"><img src="${page.image}" alt="${page.title}" loading="lazy">${page.imageCaption ? `<div class="portrait-caption">${page.imageCaption}</div>` : ''}</div>`;
    }

    const paras = page.content.split('\n\n').map(p => `<p>${p}</p>`).join('');
    el.innerHTML = `<article class="lore-article"><h1>${page.title}</h1><div class="divider" style="background:linear-gradient(90deg,${color},transparent)"></div>${headerImg}${portrait}${paras}<div style="clear:both"></div></article>`;
  }
}

// Particles
(function() {
  const c = document.getElementById('particles'), ctx = c.getContext('2d'), ps = [];
  function resize() { c.width = innerWidth*2; c.height = innerHeight*2; ctx.setTransform(2,0,0,2,0,0); }
  resize();
  for (let i = 0; i < 50; i++) ps.push({x:Math.random()*innerWidth, y:Math.random()*innerHeight, vx:(Math.random()-.5)*.15, vy:(Math.random()-.5)*.15, r:Math.random()*1.5+.5, o:Math.random()*.25+.05});
  (function draw() {
    ctx.clearRect(0,0,innerWidth,innerHeight);
    ps.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=innerWidth; if(p.x>innerWidth)p.x=0; if(p.y<0)p.y=innerHeight; if(p.y>innerHeight)p.y=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,215,120,${p.o})`; ctx.fill(); });
    requestAnimationFrame(draw);
  })();
  addEventListener('resize', resize);
})();

addEventListener('hashchange', () => { currentPath = parseHash(); render(); });
currentPath = parseHash();
render();
</script>
</body>
</html>
